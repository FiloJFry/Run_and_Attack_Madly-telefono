        <script>
            class Nemico
{
    constructor(nome,velocità,vita,attacco,coloreAttacco,Frasi)
    {
        this._nome = nome;
        this._velocità = velocità;
        this._vita = vita;
        this._maxvita = vita;
        this._attacco = attacco;
        this._coloreAttacco = coloreAttacco;
        this._Frasi = Frasi
    }
    get nome()
    {
        return this._nome;
    }
    get vita()
    {
        return this._vita;
    }
    set vita(life)
    {
        this._vita = life;
    }
    set velocità(boost)
    {
        this._velocità = boost;
    }
    get velocità()
    {
        return this._velocità;
    }
    set maxvita(lifelife)
    {
        this._maxvita = lifelife;
    }
    get maxvita()
    {
        return this._maxvita;
    }
    set attacco(at)
    {
        this._attacco = at;
    }
    get attacco()
    {
        return this._attacco;
    }
    set coloreAttacco(cat)
    {
        this._coloreAttacco = cat;
    }
    get coloreAttacco()
    {
        return this._coloreAttacco;
    }
    set Frasi(voiceline)
    {
        this._Frasi = voiceline;
    }
    get Frasi()
    {
        return this._Frasi;
    }
    AllAttacco(DatiDiPosizione)
    {   
        if(!DatiDiPosizione.InPausa)
        {
            DatiDiPosizione.AllAttacco = true;
            Boss.setAttribute('src',`./Immagini/Nemici/${this.nome}_attaccando.jpg`);
            FrasiNemico.textContent = `${this.Frasi[0]}`;
            AttaccoNemico.style.color = this.coloreAttacco;
            setTimeout(() => {Boss.setAttribute('src',`./Immagini/Nemici/${this.nome}.jpg`); FrasiNemico.textContent = "";},1000);
            this.Attacco(DatiDiPosizione);
        }
    }
    Attacco(DatiDiPosizione)
    {   
        setTimeout(() => {
        if(DatiDiPosizione.distanzaAG > 0 && !DatiDiPosizione.InPausa)
        {
            DatiDiPosizione.distanzaAG = DatiDiPosizione.distanzaAG - 1;
            AttaccoNemico.style.transform = `scale(${10/Math.max(DatiDiPosizione.distanzaAG,1)})`;
            this.Attacco(DatiDiPosizione);
        }
        else
        {   
            DatiDiPosizione.AllAttacco = false;
            return;
        }},1000/this.velocità);
    }
    Moto(DatiDiPosizione)
    {   
        let direzione = Math.random() < 0.5;
        let spazio = Math.random()*200;
        DatiDiPosizione.InMoto = true;
        this.AggiornaPosizione(direzione,DatiDiPosizione,spazio);
    }
    AggiornaPosizione(direzione,DatiDiPosizione,spazio)
    {   
        setTimeout(() => {
        if(spazio > 0 && DatiDiPosizione.InMoto && DatiDiPosizione.posA >= 0 && DatiDiPosizione.posA <= 200 && !DatiDiPosizione.InPausa)
        {
        if(direzione && DatiDiPosizione.posA > 0)
        {
            DatiDiPosizione.posA = DatiDiPosizione.posA - 1;
            if(DatiDiPosizione.posA < DatiDiPosizione.posG)
            {
                DatiDiPosizione.distanza = DatiDiPosizione.distanza + 1;
            }
            else
            {
                DatiDiPosizione.distanza = DatiDiPosizione.distanza - 1;
            }
        }
        else if(!direzione && DatiDiPosizione.posA < 200)
        {
            DatiDiPosizione.posA += 1;
            if(DatiDiPosizione.posA > DatiDiPosizione.posG)
            {
                DatiDiPosizione.distanza = DatiDiPosizione.distanza + 1;
            }
            else
            {
                DatiDiPosizione.distanza = DatiDiPosizione.distanza - 1;
            }
        }
        spazio -= 1;
        Boss.style.transform = `scale(${10/Math.max(DatiDiPosizione.distanza,10)})`;
        if(AttaccoNemico.style.color == "transparent")
        {
            DatiDiPosizione.distanzaAG = DatiDiPosizione.distanza;
            AttaccoNemico.style.transform = `scale(${10/Math.max(DatiDiPosizione.distanzaAG,1)})`;
        }
        this.AggiornaPosizione(direzione,DatiDiPosizione,spazio);
        }
        else
        {
            DatiDiPosizione.InMoto = false;
            return;
        }},1000/this.velocità);
    }

}
class Arma
{   
    constructor(nome,danni,portata,munizioni,inventario,rateo,altorateo,mirino,Rumori)
    {
        this._nome = nome;
        this._danni = danni;
        this._portata = portata;
        this._munizioni = munizioni;
        this._maxmunizioni = munizioni;
        this._inventario = inventario;
        this._rateo = rateo;
        this._altorateo = altorateo;
        this._mirino = mirino;
        this._Rumori = Rumori;
    }
    set nome(name)
    {   
        this._nome = name;
    }
    get nome()
    {
        return this._nome;
    }
    set danni(danni)
    {
        this._danni = danni;
    }
    get danni()
    {
        return this._danni;
    }
    set portata(portata)
    {
        this._portata = portata;
    }
    get portata()
    {
        return this._portata;
    }
    set munizioni(ammo)
    {
        this._munizioni = ammo;
    }
    get munizioni()
    {
        return this._munizioni;
    }
    set inventario(ammo)
    {
        this._inventario = ammo;
    }
    get inventario()
    {
        return this._inventario;
    }
    set rateo(rateo)
    {
        this._rateo = rateo;
    }
    get rateo()
    {
        return this._rateo;
    }
    set altorateo(altorateo)
    {
        this._altorateo = altorateo;
    }
    get altorateo()
    {
        return this._altorateo;
    }
    set maxmunizioni(riferimento)
    {
        this._maxmunizioni = riferimento;
    }
    get maxmunizioni()
    {
        return this._maxmunizioni;
    }
    set mirino(testo)
    {
        this._mirino = testo;
    }
    get mirino()
    {
        return this._mirino;
    }
    set Rumori(suoni)
    {
        this._Rumori = suoni; 
    }
    get Rumori()
    {
        return this._Rumori;
    }
    Spara()
    {    
        if(this.munizioni > 0)
        { 
            ArmaInCanna.setAttribute('src',`./Immagini/Armi/${this.nome}_attaccando.jpg`);
            this.munizioni -= 1;
            PiuInfo.textContent = `${this.munizioni}|${this.inventario}`;
            RumoriArma.textContent = `${this.Rumori[0]}`; 
            setTimeout(() => {ArmaInCanna.setAttribute('src',`./Immagini/Armi/${this.nome}.jpg`); RumoriArma.textContent = "";},100);
        }
        else
        {   
            PiuInfo.style.color = 'red';
            setTimeout(() => {PiuInfo.style.color = 'white';},1000);
        }
    }
    Ricarica()
    {   
        if(this.inventario > 0 && this.munizioni < this.maxmunizioni)
        {
            this.Step("Ricarica","_ricarica1");
            setTimeout(() => {this.Step("Ricarica","_ricarica2")},1000);
            setTimeout(() => {this.Step("Armi","")},2000);
        }
        else if(this.inventario == 0)
        {
            PiuInfo.style.color = "red";
            setTimeout(() => {PiuInfo.style.color = "white";},1000);
        }
    }
    Step(a,p)
    {
        ArmaInCanna.classList.add('slideOutDown');
        setTimeout(() => {ArmaInCanna.setAttribute('src',`./Immagini/${a}/${this.nome}${p}.jpg`); ArmaInCanna.classList.remove('slideOutDown'); ArmaInCanna.classList.add('slideInUp'); if(p != ""){RumoriArma.textContent = `${this.Rumori[p.split('a')[2]]}`;} else{RumoriArma.textContent = "";}},500);
        setTimeout(() => {ArmaInCanna.classList.remove('slideInUp');
        if(p == "")
        {   
            let carica = this.maxmunizioni - this.munizioni;
            if(this.inventario < carica)
        {
            this.munizioni += this.inventario;
            this.inventario = 0;
        }
        else
        {
            this.inventario -= carica;
            this.munizioni = this.maxmunizioni;
        }
            PiuInfo.textContent = `${this.munizioni}|${this.inventario}`;
        }},1000);
    }
}
class Mischia extends Arma
{   
    Spara()
    {
        if(this.munizioni == 1)
        {
            ArmaInCanna.setAttribute('src',`./Immagini/Armi/${this.nome}_attaccando.jpg`);
            this.munizioni = 0;
            setTimeout(() => {ArmaInCanna.setAttribute('src',`./Immagini/Armi/${this.nome}.jpg`);},100);
        }
        else
        {
            document.querySelector('#PienBarraMischia').style.backgroundColor = 'red';
            setTimeout(() => {document.querySelector('#PienBarraMischia').style.backgroundColor = 'white';},1000);
        }
    }
    Ricarica()
    {   
        BarraMischia.classList.add('BarraInCarica');
        BarraMischia.addEventListener('animationend',() => this.Fatto());
    }
    Fatto()
    {   
        this.munizioni = 1; 
        BarraMischia.classList.remove('BarraInCarica');
        BarraMischia.removeEventListener('animationend',() => this.Fatto());
    }
}

                risparo = false;
                gap = setTimeout(() => {risparo = true;},ArmaPresa.rateo + 100);
                if(ArmaPresa == MischiaEquipaggiata)
                {
                    ArmaPresa.Ricarica();
                if(colpito)
                {
                    Dotazione.forEach(A => {A.inventario = A.inventario + 3*A.maxmunizioni;});
                }
                }
            }
        }}
        else
        {
            Colpo = false;
            if(ArmaPresa.altorateo)
            {
                if(Spara != undefined)
                {
                    clearInterval(Spara);
                    Spara = undefined;
                }
            }
        }});
    BottoneMuoviSu.addEventListener('pointerdown',(event) => {event.stopPropagation(); BottoneMuoviSu.style.opacity = "1"; if(!DatiDiPosizione.InPausa){
                if(!DatiDiPosizione.Corri)
                {
                    ArmaInCanna.classList.add('shake');
                    DatiDiPosizione.Corri = true;
                    Protagonista.Muovi(true,DatiDiPosizione);
                    if(MirID == undefined)
                    {
                        MirID = setInterval(() => {AggiornaMirino(ArmaPresa,DatiDiPosizione.distanza); if(!DatiDiPosizione.Corri && !DatiDiPosizione.InMoto){clearInterval(MirID); MirID = undefined;}},10);
                    }
                }}
            else
            {
                DatiDiPosizione.Corri = false;
                ArmaInCanna.classList.remove('shake');
            }});
    BottoneMuoviGiù.addEventListener('pointerdown',(event) => {event.stopPropagation(); BottoneMuoviGiù.style.opacity = "1"; if(!DatiDiPosizione.InPausa){
                if(!DatiDiPosizione.Corri)
                {
                    ArmaInCanna.classList.add('shake');
                    DatiDiPosizione.Corri = true;
                    Protagonista.Muovi(false,DatiDiPosizione);
                    if(MirID == undefined)
                    {
                        MirID = setInterval(() => {AggiornaMirino(ArmaPresa,DatiDiPosizione.distanza); if(!DatiDiPosizione.Corri && !DatiDiPosizione.InMoto){clearInterval(MirID); MirID = undefined;}},10);
                    }
                }}
                else
                {
                    DatiDiPosizione.Corri = false;
                    ArmaInCanna.classList.remove('shake');
                }});
    BottoneMuoviSu.addEventListener('pointerup',(event) => {event.stopPropagation(); BottoneMuoviSu.style.opacity = "0.5"; DatiDiPosizione.Corri = false; ArmaInCanna.classList.remove('shake');});
    BottoneMuoviGiù.addEventListener('pointerup',(event) => {event.stopPropagation(); BottoneMuoviGiù.style.opacity = "0.5"; DatiDiPosizione.Corri = false; ArmaInCanna.classList.remove('shake');});
    BottoneSpara.addEventListener('pointerup',(event) => {event.stopPropagation(); BottoneSpara.style.opacity = "0.5";
                    Colpo = false;
                    if(ArmaPresa.altorateo)
                    {
                        if(Spara != undefined)
                        {
                            clearInterval(Spara);
                            Spara = undefined;
                        }
                    }
                });
    document.addEventListener('pointerdown',(event) => {event.stopPropagation(); if(!DatiDiPosizione.InPausa){PausaRiprendi(DatiDiPosizione,NemicoScelto)}});
    Partita = setInterval(() => {
        if(Protagonista.vita == 0)
        {
            clearInterval(Partita);
        }
        else
        {
        if(Math.random() < 0.5 && !DatiDiPosizione.AllAttacco)
        {
            NemicoScelto.AllAttacco(DatiDiPosizione);
            EccoloCheArriva = setInterval(() => {if(!DatiDiPosizione.AllAttacco){Colpito(Protagonista,DatiDiPosizione,EccoloCheArriva); if(Protagonista.vita == 0){Fine(Partita,DatiDiPosizione,MirID,Spara,false,NemicoScelto);}}},10); 
        }
        else
        {   
            if(!DatiDiPosizione.InPausa)
            {
            NemicoScelto.Moto(DatiDiPosizione);
            if(MirID == undefined)
            {
                MirID = setInterval(() => {AggiornaMirino(ArmaPresa,DatiDiPosizione.distanza); if(!DatiDiPosizione.Corri && !DatiDiPosizione.InMoto){clearInterval(MirID); MirID = undefined;}},10);
            }
            }
        }
        }
    },4000/difficoltà);
}
function VaiVaiVai()
{
    Nemici.forEach(N => {if(sessionStorage.getItem("Nemico scelto") == N.nome){NemicoScelto = N;}});
    Armi.forEach(A => {if(sessionStorage.getItem("ShotgunEquipaggiato") == A.nome){ShotgunEquipaggiato = A;} else if (sessionStorage.getItem("AssaltoEquipaggiato") == A.nome){AssaltoEquipaggiato = A;} else if (sessionStorage.getItem("CecchinoEquipaggiato") == A.nome){CecchinoEquipaggiato = A;}});
    Mischie.forEach(M => {if(sessionStorage.getItem("MischiaEquipaggiata") == M.nome){MischiaEquipaggiata = M;}})
    difficoltà = Number(sessionStorage.getItem("Difficoltà"));
    AggiornaImpostazioni();
    Gioco(Protagonista,ShotgunEquipaggiato,AssaltoEquipaggiato,CecchinoEquipaggiato,MischiaEquipaggiata,NemicoScelto,DatiDiPosizione);
}
